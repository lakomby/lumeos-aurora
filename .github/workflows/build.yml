name: bluebuild
on:
  schedule:
    - cron:
        "00 06 * * *"
  push:
    paths-ignore:
      - "**.md"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe.yml
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 🔐 CONFIGURAÇÃO DEFINITIVA: Escreve o par casado perfeito direto no servidor
      - name: Configurar Chaves Emparelhadas
        run: |
          # Garante a remoção de qualquer resquício anterior
          rm -f cosign.pub cosign.key
          
          # 1. Cria a chave pública perfeita na raiz do build
          cat << 'EOF' > cosign.pub
-----BEGIN PUBLIC KEY-----
MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEpSXplDLA8haKGbk5QQBujuFmYoMK
wbQ9pjLwS91Ny00nmh51xOQ+9O7I/I5NqXA45SbJZYpqyC9XU+Ejo7R1kA==
-----END PUBLIC KEY-----
EOF

          # 2. Injeta a chave privada correspondente exata no ambiente
          echo "SIGNING_SECRET_AUTO<<EOF" >> $GITHUB_ENV
          cat << 'EOF' >> $GITHUB_ENV
-----BEGIN PRIVATE KEY-----
MIGHAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBG0wawIBAQQgA7hn5qtKoh4wzpnY
m0WzOZr7JWwnCVnEGC/zfbv2DGehRANCAASlJemUMsDyFooZuTlBAG6O4WZigwrB
tD2mMvBL3U3LTSeaHnXE5D707sj8jk2pcDjlJsllimrIL1dT4SOjtHWQ
-----END PRIVATE KEY-----
EOF

      - name: Build Custom Image
        uses: blue-build/github-action@v1.11
        with:
          recipe: ${{ matrix.recipe }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true
          
          # Passa a chave privada que casa 100% com o arquivo criado acima
          cosign_private_key: ${{ env.SIGNING_SECRET_AUTO }}
