name: bluebuild
on:
  schedule:
    - cron:
        "00 06 * * *"
  push:
    paths-ignore:
      - "**.md"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe.yml
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 🪄 TRUQUE DE MESTRE: Injeta a chave em Base64 puro para o Linux montar o bloco PEM original em memória
      - name: Reconstruir PEM Original
        run: |
          # Uma única linha contínua em Base64 que contém o arquivo key inteiro com quebras de linha perfeitas
          B64_KEY=""
          
          echo "SIGNING_SECRET_AUTO<<EOF" >> $GITHUB_ENV
          echo "$B64_KEY" | base64 -d >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Build Custom Image
        uses: blue-build/github-action@v1.11
        with:
          recipe: ${{ matrix.recipe }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true
          cosign_private_key: ${{ env.SIGNING_SECRET_AUTO }}
