name: bluebuild
on:
  schedule:
    - cron:
        "00 06 * * *"
  push:
    paths-ignore:
      - "**.md"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe.yml
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 🪄 TRUQUE MÁGICO CORRIGIDO: Salvando bloco multi-linhas no GitHub do jeito certo
      - name: Gerar Chaves do Cosign na Marra
        env:
          COSIGN_PASSWORD: ""
        run: |
          curl -Lo cosign https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64
          chmod +x cosign
          ./cosign generate-key-pair
          
          # Sintaxe oficial do GitHub para aceitar textos de várias linhas sem quebrar
          echo "SIGNING_SECRET_AUTO<<EOF" >> $GITHUB_ENV
          cat cosign.key >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Build Custom Image
        uses: blue-build/github-action@v1.11
        with:
          recipe: ${{ matrix.recipe }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true
          
          # Injeta a variável multi-linha limpinha
          cosign_private_key: ${{ env.SIGNING_SECRET_AUTO }}
