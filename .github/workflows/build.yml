name: bluebuild
on:
  schedule:
    - cron:
        "00 06 * * *" # Build automático às 06:00 UTC todos os dias
  push:
    paths-ignore: # Não reconstrói se apenas a documentação foi alterada
      - "**.md"
  pull_request:
  workflow_dispatch: # Permite disparar o build manualmente pelo botão no GitHub

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe.yml
    steps:
      - name: Build Custom Image
        uses: blue-build/github-action@v1.11
        with:
          recipe: ${{ matrix.recipe }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true
          
          # Envia a chave secreta falsa que criámos nas Settings para acalmar o instalador
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
