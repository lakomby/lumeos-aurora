name: bluebuild
on:
  schedule:
    - cron: "00 06 * * *"
  push:
    paths-ignore:
      - "**.md"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Instalar BlueBuild CLI
        run: cargo install blue-build

      - name: Logar no GitHub Packages
        run: echo "${{ github.token }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build e Push da Imagem (Força Bruta sem Assinatura)
        run: bluebuild build --push --no-sign config/recipe.yml
