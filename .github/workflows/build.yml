name: bluebuild
on:
  schedule:
    - cron:
        "00 06 * * *"
  push:
    paths-ignore:
      - "**.md"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe.yml
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 🪄 TRUQUE MÁGICO: Instala o cosign oficial e gera o par de chaves perfeito direto no servidor
      - name: Gerar Chaves do Cosign na Marra
        run: |
          curl -Lo cosign https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64
          chmod +x cosign
          ./cosign generate-key-pair --insecure-skip-verify
          # Joga a chave privada gerada para dentro do ambiente que a action espera
          echo "SIGNING_SECRET_AUTO=$(cat cosign.key)" >> $GITHUB_ENV
          # Substitui o cosign.pub do repositório pelo gerado agora
          cp cosign.pub ./cosign.pub

      - name: Build Custom Image
        uses: blue-build/github-action@v1.11
        with:
          recipe: ${{ matrix.recipe }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true
          
          # Puxa a chave perfeita que o servidor acabou de criar na linha de cima
          cosign_private_key: ${{ env.SIGNING_SECRET_AUTO }}
