name: bluebuild
on:
  schedule:
    - cron:
        "00 06 * * *"
  push:
    paths-ignore:
      - "**.md"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe.yml
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 🔐 CONFIGURAÇÃO DE CHAVES EM LINHA ÚNICA (ZERO ERROS DE SINTAXE)
      - name: Configurar Chaves do Cosign
        run: |
          rm -f cosign.pub cosign.key
          
          # Escreve a chave pública direto no arquivo em uma única linha limpa
          echo "-----BEGIN PUBLIC KEY-----" > cosign.pub
          echo "MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEx0FdNiS2l1kgcRopeEsq8VRgYvtTBk1YQkM67TXxOXwj9u2QWmm/2AQYjgfmuC4CnmMCFLTdeQU7rkeF9S/9yg==" >> cosign.pub
          echo "-----END PUBLIC KEY-----" >> cosign.pub
          
          # Injeta a chave privada direto no ambiente em uma linha contínua perfeita
          echo "SIGNING_SECRET_AUTO=-----BEGIN COSIGN PRIVATE KEY----------END COSIGN PRIVATE KEY-----" >> $GITHUB_ENV

      - name: Build Custom Image
        uses: blue-build/github-action@v1.11
        with:
          recipe: ${{ matrix.recipe }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true
          cosign_private_key: ${{ env.SIGNING_SECRET_AUTO }}
