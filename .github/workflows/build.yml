name: bluebuild
on:
  schedule:
    - cron: "00 06 * * *"
  push:
    paths-ignore:
      - "**.md"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 🛠️ Instala o Podman (necessário para o BlueBuild compilar a imagem)
      - name: Instalar Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      # 📦 Instala a CLI do BlueBuild direto pelo Cargo (sem link quebrado)
      - name: Instalar BlueBuild CLI
        run: |
          cargo install blue-build
          bluebuild --version

      # 🔑 Faz o login no registro do GitHub (GHCR) para poder enviar a imagem depois
      - name: Logar no GitHub Packages
        run: |
          echo "${{ github.token }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      # 🚀 Roda o build direto no terminal SEM ASSINATURA e SEM CHATICE
      - name: Build da Imagem
        run: |
          bluebuild build --no-sign ./recipes/recipe.yml
