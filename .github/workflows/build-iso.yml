- name: Checkout do código
        uses: actions/checkout@v4

      # Esta linha garante que o Dockerfile.iso junta o teu script e a pasta doc local
      - name: Build da imagem corrigida com os assets locais
        run: podman build -t localhost/lumeos-iso-target -f Dockerfile.iso .

      - name: Gerar ISO
        run: |
          mkdir -p output
          sudo podman run --rm --privileged \
            -v $(pwd)/output:/output \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type iso \
            --local \
            localhost/lumeos-iso-target
