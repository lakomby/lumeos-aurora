name: Build LumeOS ISO

on:
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Criar arquivo de configuração para forçar Fedora
        run: |
          mkdir -p config
          cat << 'EOF' > config/blueprint.toml
          [customizations.os]
          # Força o builder a tratar a imagem como Fedora internamente
          id = "fedora"
          EOF

      - name: Gerar ISO Oficial LumeOS
        run: |
          mkdir -p output
          sudo podman run --rm --privileged \
            -v $(pwd)/output:/output \
            -v $(pwd)/config:/config:ro \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type iso \
            --blueprint /config/blueprint.toml \
            ghcr.io/lakomby/lumeos-aurora:latest

      - name: Upload da ISO
        uses: actions/upload-artifact@v4
        with:
          name: LumeOS-Aurora-ISO
          path: output/bootiso/install.iso
