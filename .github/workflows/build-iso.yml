name: Build LumeOS ISO

on:
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build da imagem wrapper (Patch de Distro)
        run: podman build -t lumeos-iso-target -f Dockerfile.iso .

      - name: Gerar ISO
        run: |
          mkdir -p output
          sudo podman run --rm --privileged \
            -v $(pwd)/output:/output \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type iso \
            --local \
            localhost/lumeos-iso-target

      - name: Upload da ISO
        uses: actions/upload-artifact@v4
        with:
          name: LumeOS-Aurora-ISO
          path: output/bootiso/install.iso
