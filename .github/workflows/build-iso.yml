name: Build LumeOS ISO

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Criar pasta de saída
        run: mkdir -p ${{ github.workspace }}/output

      - name: Compilar a imagem do LumeOS localmente
        # ATENÇÃO: Este passo exige que o arquivo "Containerfile" ou "Dockerfile" 
        # esteja na raiz do seu repositório no GitHub. Se não estiver, vai falhar.
        run: sudo podman build -t localhost/lumeos-aurora:latest .

      - name: Rodar Bootc Image Builder (Gerar ISO)
        run: |
          sudo podman run --rm --privileged \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            -v ${{ github.workspace }}/output:/output \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type iso \
            --local \
            localhost/lumeos-aurora:latest

      - name: Upload da ISO como Artefato
        uses: actions/upload-artifact@v4
        with:
          name: LumeOS-Aurora-ISO
          path: ${{ github.workspace }}/output/bootiso/install.iso
