name: Generate ISO
on:
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y make
        
      - name: Build ISO
        uses: ublue-os/isogenerator@main
        with:
          IMAGE_REPO: "ghcr.io/lakomby"
          IMAGE_NAME: "lumeos-aurora"
          IMAGE_TAG: "latest"
          VARIANT: "Kinoite"
          
      - name: Upload ISO to Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
