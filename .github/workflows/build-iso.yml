- name: Build ISO via Bootc Image Builder
        uses: osbuild/bootc-image-builder-action@v1
        with:
          image: ghcr.io/${{ github.repository_owner }}/lumeos-aurora:26
          type: iso

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LumeOS-Aurora-ISO
          path: |
            ./output/bootiso/install.iso
            ./output/image/image.iso
