name: Build LumeOS ISO

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Criar pasta de saída
        run: mkdir -p ${{ github.workspace }}/output

      - name: Login no GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Puxar a imagem do LumeOS pelo SHA exato
        run: sudo podman pull ghcr.io/lakomby/lumeos-aurora@sha256:7210e302be8d1d2b7bd5e1b2bf8b97d190b26f58bb7928b08709a3416298516fb

      - name: Rodar Bootc Image Builder
        run: |
          sudo podman run --rm --privileged \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            -v ${{ github.workspace }}/output:/output \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type iso \
            ghcr.io/lakomby/lumeos-aurora@sha256:7210e302be8d1d2b7bd5e1b2bf8b97d190b26f58bb7928b08709a3416298516fb

      - name: Upload da ISO como Artefato
        uses: actions/upload-artifact@v4
        with:
          name: LumeOS-Aurora-ISO
          path: ${{ github.workspace }}/output/bootiso/install.iso
