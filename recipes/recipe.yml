# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: lumeos-aurora
description: LumeOS Aurora

# Caminho oficial direto da infraestrutura da RedHat/Fedora (KDE Imutável)
base-image: quay.io/fedora/fedora-kinoite
image-version: "41"

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: rpm-ostree
    install:
      - google-chrome-stable
      - google-earth-pro-stable
      - spotify-client
      - kdenlive
      - onlyoffice-desktopeditors
      - vlc
      - papirus-icon-theme
    remove:
      - kfind
      - libreoffice-core

  - type: script
    scripts:
      - customizar_lumeos.sh
