# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: lumeos-aurora
description: LumeOS Aurora

base-image: quay.io/fedora/fedora-kinoite
image-version: "41"

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: rpm-ostree
    install:
      - kdenlive
      - vlc
      - papirus-icon-theme
      - steam
      - lutris
      - mangohud
    remove:
      - kfind
      - libreoffice-core

  - type: script
    scripts:
      - customizar_lumeos.sh
